databases:
  - name: jusbid-db
    plan: free
    databaseName: jusbid
    user: jusbid_user

services:
  # Backend API
  - type: web
    name: jusbid-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jusbid-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: jusbid-frontend
          type: web
          property: url
      - key: NODE_ENV
        value: production

  # Frontend (Static Site)
  - type: web
    name: jusbid-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: jusbid-backend
          type: web
          property: url
